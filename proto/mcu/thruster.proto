syntax = "proto3";

package mcu.thruster;

import "mcu/port.proto";

option go_package = "crossocean.com/edge_gateway/pb/mcu/thruster";

// 电机错误状态码
enum Status {
  NORMAL           = 0x00;       // 正常
  STALL            = 0x01;       // 堵转
  MOTOR_OVERHEAT   = 0x02;       // 电机过温
  MOS_OVERHEAT     = 0x04;       // MOS过温
  OVER_CURRENT     = 0x08;       // 过流
  COMM_FAULT       = 0x10;       // 通信故障
  MOTOR_TEMP_ERROR = 0x20;       // 电机温度错误
  MOS_TEMP_ALARM   = 0x40;       // MOS温度报警
  OVER_VOLTAGE     = 0x80;       // 过压
  UNDER_VOLTAGE    = 0x100;      // 欠压
  CIRCUIT_FAULT    = 0x200;      // 电路故障
  CHARGING         = 0x400;      // 充电状态（1：充电 0：放电）
  FAN_FAULT        = 0x800;      // 散热风扇故障
  OTHER            = 0x40000000; // 其他错误
}

// 对外输出推进器数据结构体
message OutMsg {
  mcu.port.Mcu udp_port     = 1; // UDP传输端口号
  int64        timestamp_ms = 2; // 时间戳，单位毫秒

  uint32        thruster_num = 3; // 推进器数量
  repeated Data thrusters    = 4; // 推进器数据列表
}

// 单个推进器数据结构体
message Data {
  uint32 status     = 1; // 电机状态码（暂时不使用）
  uint32 error_code = 2; // 电机错误状态码

  int32  rpm             = 3;  // 转速，单位：rpm
  int32  angle10         = 4;  // 角度，单位：0.1°
  int32  power100        = 5;  // 功率，单位：0.01kW
  uint32 bus_voltage10   = 6;  // 母线电压，单位：0.1V
  int32  bus_current10   = 7;  // 母线电流，单位：0.1A
  int32  phase_current10 = 8;  // 相电流，单位：0.1A
  int32  motor_temp      = 9;  // 电机温度，单位：°C
  int32  mos_temp        = 10; // mos温度，单位：°C
  int32  power_temp      = 11; // 电源温度,单位：°C

  uint32 run_time     = 12; // 本次运行时间，单位：min
  uint32 sum_run_time = 13; // 总运行时间，单位：h
}

