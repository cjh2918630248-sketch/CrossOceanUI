syntax = "proto3";

package gins.data;

option go_package = "crossocean.com/edge_gateway/pb/mcu/gins_data";

// GINSData: 惯导/GNSS 融合结果的对外输出结构。
// 学习要点：
// 1) `=` 后面的数字是字段号（wire tag），一旦发布后不要随意修改；
// 2) 业务单位常做缩放（如 0.1 度、0.01m/s），便于跨语言保持整数精度；
// 3) 修改本文件后应重新执行 protoc 生成 pb.h/pb.cc。
message GINSData
{
  uint32 port        = 1;  // UDP传输端口号（数据来源标识）
  
  // 时间与位置
  double utc_local   = 2;  // UTC本地时间（通常是秒或时间戳，按上游定义解释）
  double latitude    = 3;  // 纬度（度）
  double longitude   = 4;  // 经度（度）
  float  altitude    = 5;  // 海拔（米）

  // 姿态：roll/pitch 采用 0.1 度缩放，使用时请除以 10
  //================UI=====================
  int32  roll_deg10  = 6;  // 横滚角，单位 0.1 度
  int32  pitch_deg10 = 7;  // 俯仰角，单位 0.1 度
  float  heading_deg = 8;  // 航向角，单位 度

  // 速度：vn/ve 采用 0.01 m/s 缩放，使用时请除以 100
  int32  vn_mps100   = 9;  // 北向速度，单位 0.01 米/秒
  int32  ve_mps100   = 10; // 东向速度，单位 0.01 米/秒

  // 惯导输出
  float  roti        = 11; // 旋转速率，单位 度/秒
  float  ax          = 12; // 机体 X 向加速度，单位 米/秒²
  float  ay          = 13; // 机体 Y 向加速度，单位 米/秒²
  float  aaz         = 14; // 机体 Z 向加速度，单位 米/秒²

  // 质量与状态
  uint32 gins_status = 15; // GINS 状态字（通常按位定义）
  uint32 hdop10      = 16; // HDOP，单位 0.1（实际值 = hdop10 / 10）
  float  head_std    = 17; // 航向标准差，单位 度
}
