syntax = "proto3";

package thruster;

option go_package = "crossocean.com/edge_gateway/pb/mcu/thruster";

// 学习说明：
// - 该协议描述推进器运行状态与遥测数据；
// - `error_code` 对应 Status 的位标志组合（可多个故障同时存在）；
// - 角度/电流/功率等字段都带缩放单位，业务展示前要换算。

// 电机错误状态码
enum Status
{
  NORMAL           = 0;
  STALL            = 1;          // 0x0000 0001: 堵转
  MOTOR_OVERHEAT   = 2;          // 0x0000 0002: 电机过温
  MOS_OVERHEAT     = 4;          // 0x0000 0004: MOS过温
  OVER_CURRENT     = 8;          // 0x0000 0008: 过流
  COMM_FAULT       = 16;         // 0x0000 0010: 通信故障
  MOTOR_TEMP_ERROR = 32;         // 0x0000 0020: 电机温度错误
  MOS_TEMP_ALARM   = 64;         // 0x0000 0040: MOS温度报警
  OVER_VOLTAGE     = 128;        // 0x0000 0080: 过压
  UNDER_VOLTAGE    = 256;        // 0x0000 0100: 欠压
  CIRCUIT_FAULT    = 512;        // 0x0000 0200: 电路故障
  CHARGING         = 1024;       // 0x0000 0400: 充电状态（1：充电 0：放电）
  FAN_FAULT        = 2048;       // 0x0000 0800: 散热风扇故障
  OTHER            = 1073741824; // 0x4000 0000: 其他错误
}

// 单个推进器数据结构体
message Data
{

  uint32 status     = 1; // 电机状态码（暂时不使用）
  uint32 error_code = 2; // 电机错误状态码（按 Status 位组合）
//=================================================
  int32  rpm           = 3;  // 转速，单位：rpm
  int32  angle         = 4;  // 角度，单位：0.1°（实际值 = angle / 10）
  //=============================================================
  int32  power         = 5;  // 功率，单位：0.01kW
  uint32 bus_voltage   = 6;  // 母线电压，单位：0.1V
  int32  bus_current   = 7;  // 母线电流，单位：0.1A
  int32  phase_current = 8;  // 相电流，单位：0.1A
  int32  motor_temp    = 9;  // 电机温度，单位：°C
  int32  mos_temp      = 10; // mos温度，单位：°C
  int32  _temp         = 11; // 电源温度,单位：°C

  uint32 run_time     = 12; // 本次运行时间，单位：min
  uint32 sum_run_time = 13; // 总运行时间，单位：h
}

// 对外输出推进器数据结构体
message OutMsg
{
  uint32        port         = 1; // UDP传输端口号
  
  uint32        thruster_num = 2; // 推进器数量（通常与 thrusters_ 长度一致）
  repeated Data thrusters_   = 3; // 推进器数据列表
}
