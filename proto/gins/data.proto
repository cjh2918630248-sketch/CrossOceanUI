syntax = "proto3";

package gins.data;

import "gins/port.proto";

option go_package = "crossocean.com/edge-gateway/pb/gins/data";

// GINS 导航数据帧
message OutMsg {
  gins.port.Gins udp_port     = 1; // UDP传输端口号
  int64          timestamp_ms = 2; // 时间戳，单位毫秒

  int32  utc_local100 = 3;  // utc本地时间(0.01 s)
  int32  latitude1e7  = 4;  // 纬度(1e-7 deg)
  int32  longitude1e7 = 5;  // 经度(1e-7 deg)
  int32  altitude1e3  = 6;  // 海拔(1e-3 m)
  int32  roll100      = 7;  // 横滚角(0.01 deg)
  int32  pitch100     = 8;  // 俯仰角(0.01 deg)
  uint32 heading100   = 9;  // 艏向角(0.01 deg)
  uint32 course100    = 10; // 航向角(0.01 deg)
  int32  vn_mps100    = 11; // 北向速度(0.01 m/s)
  int32  ve_mps100    = 12; // 东向速度(0.01 m/s)
  int32  roti1e5      = 13; // 旋转速率(1e-5 rad/s)
  int32  ax1e5        = 14; // 机体加速度(1e-5 m/s^2)
  int32  ay1e5        = 15; // 机体加速度(1e-5 m/s^2)
  int32  aaz1e5       = 16; // 机体加速度(1e-5 rad/s^2)
  uint32 gins_status  = 17; // GINS状态字
  uint32 hdop10       = 18; // hdop(0.1)
  int32  head_std1e5  = 19; // 航向标准差(1e-5)
}
